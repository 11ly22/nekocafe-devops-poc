global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus-rules.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: reservation
    metrics_path: /metrics
    static_configs:
      - targets: ["reservation:8080"]
        labels:
          service: reservation
  - job_name: member
    metrics_path: /metrics
    static_configs:
      - targets: ["member:8080"]
        labels:
          service: member
